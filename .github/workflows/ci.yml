name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev

      - name: Type check
        run: npx tsc -p ui/tsconfig.json --noEmit && npx tsc -p api/tsconfig.json --noEmit

      - name: Build
        run: npx dt-app build
